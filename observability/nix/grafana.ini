[server]
http_port = 3001
root_url = http://localhost:3001

[paths]
data = ${OBS_DIR}/grafana
logs = ${OBS_DIR}/grafana/logs
plugins = ${OBS_DIR}/grafana/plugins
provisioning = ${OBS_DIR}/grafana/provisioning

[security]
admin_user = admin
admin_password = admin

[auth.anonymous]
enabled = false

[log]
mode = console
level = info

[analytics]
reporting_enabled = false
check_for_updates = false
