services:
  postgres:
    image: postgres:18-alpine
    container_name: laundry_dev_postgres
    environment:
      POSTGRES_USER: ${USER}
      POSTGRES_PASSWORD: postgres_dev_password
      POSTGRES_DB: laundry_app_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
