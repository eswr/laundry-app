services:
  # OpenTelemetry Collector — receives OTLP from backend, exports to Prometheus
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: laundry_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otelcol/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Prometheus — metrics storage and querying
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: laundry_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-remote-write-receiver'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Loki — log aggregation
  loki:
    image: grafana/loki:2.9.6
    container_name: laundry_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Promtail — ships Docker container logs to Loki
  promtail:
    image: grafana/promtail:2.9.6
    container_name: laundry_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Grafana — dashboards and visualization
  grafana:
    image: grafana/grafana:10.4.1
    container_name: laundry_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
